name: Build Linux (Low glibc)

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  # ============================================================
  # Linux x86_64 打包（低 glibc，兼容老系统）
  # ============================================================
  build-linux-amd64:
    runs-on: ubuntu-22.04
    container:
      image: debian:buster-slim                  # glibc 2.28
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 修复 Debian Buster 软件源
        run: |
          cat > /etc/apt/sources.list <<EOF
          deb http://archive.debian.org/debian buster main contrib non-free
          deb http://archive.debian.org/debian-security buster/updates main contrib non-free
          EOF

      - name: 安装系统依赖
        run: |
          apt-get update
          apt-get install -y python3 python3-pip python3-tk antiword tesseract-ocr tesseract-ocr-chi-sim poppler-utils

      - name: 升级 pip
        run: |
          python3 -m pip install --upgrade pip

      - name: 准备 antiword 映射文件
        run: |
          mkdir -p antiword_bin
          cp /usr/bin/antiword antiword_bin/
          cp -r /usr/share/antiword/* antiword_bin/

      - name: 安装 Python 依赖
        run: |
          python3 -m pip install -r requirements.txt
          python3 -m pip install pyinstaller xlrd olefile pytesseract pdf2image Pillow

      - name: 打包 Linux x86_64 版
        run: |
          cd ${{ github.workspace }}
          PYI_ARGS="--onefile --name FileCheckerGUI --windowed"
          PYI_ARGS="$PYI_ARGS --add-data dictionary.txt:."
          PYI_ARGS="$PYI_ARGS --add-binary antiword_bin/antiword:antiword_bin"
          for f in antiword_bin/*.txt antiword_bin/fontnames antiword_bin/fontnames.rus \
                   antiword_bin/Unicode01 antiword_bin/Unicode15 antiword_bin/Default; do
            PYI_ARGS="$PYI_ARGS --add-data $f:antiword_bin"
          done
          PYI_ARGS="$PYI_ARGS --add-binary /usr/bin/tesseract:."
          PYI_ARGS="$PYI_ARGS --add-data /usr/share/tesseract-ocr/4.00/tessdata:tessdata"
          PYI_ARGS="$PYI_ARGS --add-binary /usr/bin/pdftoppm:."
          PYI_ARGS="$PYI_ARGS --add-binary /usr/bin/pdfinfo:."
          PYI_ARGS="$PYI_ARGS --add-binary /usr/bin/pdftotext:."
          PYI_ARGS="$PYI_ARGS --hidden-import tkinter file_checker_gui.py"
          pyinstaller $PYI_ARGS

      - name: 上传 Linux x86_64 产物
        uses: actions/upload-artifact@v5
        with:
          name: FileCheckerGUI-Linux-x86_64
          path: dist/FileCheckerGUI

  # ============================================================
  # Linux ARM64 打包（低 glibc，容器化构建）
  # ============================================================
  build-linux-arm64:
    runs-on: ubuntu-22.04-arm
    container:
      image: debian:buster-slim                  # glibc 2.28
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 修复 Debian Buster 软件源
        run: |
          cat > /etc/apt/sources.list <<EOF
          deb http://archive.debian.org/debian buster main contrib non-free
          deb http://archive.debian.org/debian-security buster/updates main contrib non-free
          EOF

      - name: 安装系统依赖
        run: |
          apt-get update
          apt-get install -y python3 python3-pip python3-tk antiword tesseract-ocr tesseract-ocr-chi-sim poppler-utils

      - name: 升级 pip
        run: |
          python3 -m pip install --upgrade pip

      - name: 准备 antiword 映射文件
        run: |
          mkdir -p antiword_bin
          cp /usr/bin/antiword antiword_bin/
          cp -r /usr/share/antiword/* antiword_bin/

      - name: 安装 Python 依赖
        run: |
          python3 -m pip install -r requirements.txt
          python3 -m pip install pyinstaller xlrd olefile pytesseract pdf2image Pillow

      - name: 打包 Linux ARM64 版
        run: |
          cd ${{ github.workspace }}
          PYI_ARGS="--onefile --name FileCheckerGUI --windowed"
          PYI_ARGS="$PYI_ARGS --add-data dictionary.txt:."
          PYI_ARGS="$PYI_ARGS --add-binary antiword_bin/antiword:antiword_bin"
          for f in antiword_bin/*.txt antiword_bin/fontnames antiword_bin/fontnames.rus \
                   antiword_bin/Unicode01 antiword_bin/Unicode15 antiword_bin/Default; do
            PYI_ARGS="$PYI_ARGS --add-data $f:antiword_bin"
          done
          PYI_ARGS="$PYI_ARGS --add-binary /usr/bin/tesseract:."
          PYI_ARGS="$PYI_ARGS --add-data /usr/share/tesseract-ocr/4.00/tessdata:tessdata"
          PYI_ARGS="$PYI_ARGS --add-binary /usr/bin/pdftoppm:."
          PYI_ARGS="$PYI_ARGS --add-binary /usr/bin/pdfinfo:."
          PYI_ARGS="$PYI_ARGS --add-binary /usr/bin/pdftotext:."
          PYI_ARGS="$PYI_ARGS --hidden-import tkinter file_checker_gui.py"
          pyinstaller $PYI_ARGS

      - name: 上传 Linux ARM64 产物
        uses: actions/upload-artifact@v5
        with:
          name: FileCheckerGUI-Linux-ARM64
          path: dist/FileCheckerGUI
